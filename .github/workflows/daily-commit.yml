name: Daily Activity Commit

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          git config user.name "El-Bach"
          git config user.email "becharaabdelmassih@gmail.com"
          mkdir -p logs
          echo "$(date '+%Y-%m-%d %H:%M') | active" >> logs/activity.log
          git add -A
          git diff --staged --quiet && echo "nothing to commit" || git commit -m "chore: daily log $(date '+%Y-%m-%d')"
          git push
